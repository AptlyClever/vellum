<!DOCTYPE html>
<html lang="en" data-ca-theme="games">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vellum — Asset Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/src/ca-theme-standard.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <p class="eyebrow">Control Alt Games</p>
        <h1>Vellum</h1>
        <p class="lede">
          Control Alt Games asset vault + pipeline: register packs, stage into the Library,
          convert to <strong>game-ready</strong> elements (glTF, VFX clips, textures), and
          publish into project lanes. Watch Live ops for Ready % and running jobs.
        </p>
        <div id="live-ops" class="live-ops" aria-live="polite" aria-label="Live ops"></div>
        <div class="stats" id="stats" aria-live="polite"></div>
      </header>

      <section class="toolbar" aria-label="Filters">
        <label class="field grow">
          <span>Search</span>
          <input id="q" type="search" placeholder="Name, fit, type…" autocomplete="off" />
        </label>
        <label class="field">
          <span>Engine</span>
          <select id="engine">
            <option value="">All</option>
            <option value="unreal">Unreal</option>
            <option value="unity">Unity</option>
          </select>
        </label>
        <label class="field">
          <span>Scope</span>
          <select id="available">
            <option value="on_machine" selected>On Aurora (F:)</option>
            <option value="">All owned packs</option>
            <option value="ready">Ready</option>
            <option value="on_disk">On disk</option>
            <option value="vault">Vault only</option>
            <option value="installable">Installable</option>
            <option value="need_download">Need download (unfinished)</option>
          </select>
        </label>
      </section>

      <p class="count" id="count"></p>
      <div class="table-wrap">
        <table class="assets">
          <thead>
            <tr>
              <th>#</th>
              <th>Asset</th>
              <th>Engine</th>
              <th>Type</th>
              <th>Available</th>
              <th>Fit</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <aside class="detail" id="detail" hidden>
        <button type="button" class="close" id="detail-close" aria-label="Close detail">×</button>
        <div id="detail-body"></div>
      </aside>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
