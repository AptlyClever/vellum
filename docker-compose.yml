name: vellum

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vellum-app
    restart: unless-stopped
    ports:
      - "0.0.0.0:8770:8770"
    environment:
      VELLUM_REGISTER_PATH: /app/data/asset-register.yaml
      VELLUM_SEED_PATH: /app/config/humble-seed.yaml
      VELLUM_INTAKE_RUNS_PATH: /app/data/intake-runs.yaml
      VELLUM_JOBS_DB_PATH: /app/data/jobs.sqlite3
      VELLUM_DERIVED_PATH: /app/data/derived-outputs.yaml
      VELLUM_VAULT_ROOT: /mnt/data/vault/vellum
      VELLUM_VAULT_REGISTER_PATH: /mnt/data/vault/vellum/02-index/asset-register.yaml
      VELLUM_VAULT_INTAKE_RUNS_PATH: /mnt/data/vault/vellum/02-index/intake-runs.yaml
      VELLUM_VAULT_DERIVED_PATH: /mnt/data/vault/vellum/02-index/derived-outputs.yaml
    volumes:
      - ./data:/app/data
      - /mnt/data/vault/vellum:/mnt/data/vault/vellum
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8770/api/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vellum-worker
    restart: unless-stopped
    command: ["python", "-m", "backend.worker"]
    environment:
      PYTHONPATH: /app
      VELLUM_REGISTER_PATH: /app/data/asset-register.yaml
      VELLUM_SEED_PATH: /app/config/humble-seed.yaml
      VELLUM_INTAKE_RUNS_PATH: /app/data/intake-runs.yaml
      VELLUM_JOBS_DB_PATH: /app/data/jobs.sqlite3
      VELLUM_DERIVED_PATH: /app/data/derived-outputs.yaml
      VELLUM_VAULT_ROOT: /mnt/data/vault/vellum
      VELLUM_VAULT_REGISTER_PATH: /mnt/data/vault/vellum/02-index/asset-register.yaml
      VELLUM_VAULT_INTAKE_RUNS_PATH: /mnt/data/vault/vellum/02-index/intake-runs.yaml
      VELLUM_VAULT_DERIVED_PATH: /mnt/data/vault/vellum/02-index/derived-outputs.yaml
    volumes:
      - ./data:/app/data
      - /mnt/data/vault/vellum:/mnt/data/vault/vellum
    depends_on:
      - app

  test:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["test"]
    entrypoint: ["pytest", "-q"]
    environment:
      PYTHONPATH: /app
      VELLUM_REGISTER_PATH: /tmp/vellum-test-register.yaml
      VELLUM_SEED_PATH: /app/config/humble-seed.yaml
      VELLUM_INTAKE_RUNS_PATH: /tmp/vellum-test-intake.yaml
      VELLUM_JOBS_DB_PATH: /tmp/vellum-test-jobs.sqlite3
      VELLUM_DERIVED_PATH: /tmp/vellum-test-derived.yaml
      VELLUM_VAULT_ROOT: /tmp/vellum-test-vault
